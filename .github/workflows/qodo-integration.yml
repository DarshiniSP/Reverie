name: Qodo.ai Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  qodo-analysis:
    runs-on: ubuntu-latest
    name: Qodo Code Analysis
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for better analysis
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Qodo CLI
        run: |
          npm install -g @qodo/command
          echo "Qodo CLI setup complete"
      
      - name: Qodo Authentication
        env:
          QODO_TOKEN: ${{ secrets.QODO_TOKEN }}
        run: |
          if [ -n "$QODO_TOKEN" ]; then
            echo "Qodo token found, setting up authentication..."
            export QODO_API_KEY=$QODO_TOKEN
            echo "Authentication configured"
          else
            echo "⚠️ QODO_TOKEN not set in repository secrets"
            echo "Please add QODO_TOKEN to repository secrets for full functionality"
          fi
      
      - name: iOS Code Analysis
        env:
          QODO_API_KEY: ${{ secrets.QODO_TOKEN }}
        run: |
          echo "🔍 Analyzing iOS Swift code..."
          find ios/iAlly -name "*.swift" -type f | head -10
          echo "Found $(find ios/iAlly -name "*.swift" -type f | wc -l) Swift files"
          
          # Run Qodo analysis on iOS code
          if [ -n "$QODO_API_KEY" ]; then
            echo "Running Qodo analysis on iOS code..."
            qodo "Analyze the iOS Swift code in ios/iAlly directory and provide quality insights" > ios-analysis.txt || echo "Analysis completed with warnings"
          else
            echo "Skipping Qodo analysis - no API key"
          fi
          echo "iOS analysis complete"
      
      - name: Android Code Analysis
        env:
          QODO_API_KEY: ${{ secrets.QODO_TOKEN }}
        run: |
          echo "🔍 Analyzing Android Kotlin code..."
          find android -name "*.kt" -type f | head -10
          echo "Found $(find android -name "*.kt" -type f | wc -l) Kotlin files"
          
          # Run Qodo analysis on Android code
          if [ -n "$QODO_API_KEY" ]; then
            echo "Running Qodo analysis on Android code..."
            qodo "Analyze the Android Kotlin code in android directory and provide quality insights" > android-analysis.txt || echo "Analysis completed with warnings"
          else
            echo "Skipping Qodo analysis - no API key"
          fi
          echo "Android analysis complete"
      
      - name: Generate Quality Report
        run: |
          echo "📊 Generating quality report..."
          cat > quality-report.md << 'EOF'
          # Code Quality Report
          
          ## Summary
          - **iOS Files Analyzed**: $(find ios/iAlly -name "*.swift" -type f | wc -l) Swift files
          - **Android Files Analyzed**: $(find android -name "*.kt" -type f | wc -l) Kotlin files
          - **Analysis Date**: $(date)
          
          ## Key Metrics
          - Code Coverage: Pending Qodo integration
          - Cyclomatic Complexity: Pending analysis
          - Security Issues: Pending scan
          - Code Duplication: Pending detection
          
          ## Next Steps
          1. Configure QODO_TOKEN in repository secrets
          2. Complete Qodo.ai account setup
          3. Enable full analysis pipeline
          EOF
          
          echo "Quality report generated"
      
      - name: Upload Analysis Results
        uses: actions/upload-artifact@v4
        with:
          name: qodo-analysis
          path: |
            quality-report.md
            ios-analysis.txt
            android-analysis.txt
        if: always()

  integration-test:
    runs-on: macos-15
    name: Test Qodo Integration
    needs: qodo-analysis
    steps:
      - uses: actions/checkout@v4
      
      - name: Test iOS Build with Qodo Hooks
        run: |
          echo "🧪 Testing iOS build with Qodo integration..."
          cd ios
          
          # Test that our enhanced test script works
          if [ -f "run_tests.sh" ]; then
            echo "✅ Enhanced test script found"
            chmod +x run_tests.sh
            # Don't run full tests in this job, just validate script
            echo "Test script validation complete"
          else
            echo "❌ Enhanced test script not found"
          fi
      
      - name: Validate Configuration Files
        run: |
          echo "🔧 Validating Qodo configuration..."
          
          # Check if config directories exist
          if [ -d ".qodo" ]; then
            echo "✅ Qodo config directory found"
            ls -la .qodo/
          else
            echo "📁 Creating Qodo config directory..."
            mkdir -p .qodo
          fi
          
          # Validate iOS config
          if [ -f ".qodo/ios-config.yml" ]; then
            echo "✅ iOS config found"
          else
            echo "📝 Creating iOS config template..."
            cat > .qodo/ios-config.yml << 'EOF'
          language: swift
          framework: swiftui
          testing_framework: xctest
          coverage_threshold: 80
          exclude_paths:
            - ios/DerivedData/
            - ios/build/
          focus_areas:
            - ios/iAlly/Models/
            - ios/iAlly/Services/
            - ios/iAlly/Views/
          EOF
          fi
          
          # Validate Android config
          if [ -f ".qodo/android-config.yml" ]; then
            echo "✅ Android config found"
          else
            echo "📝 Creating Android config template..."
            cat > .qodo/android-config.yml << 'EOF'
          language: kotlin
          framework: compose
          testing_framework: junit
          coverage_threshold: 75
          exclude_paths:
            - android/build/
            - android/.gradle/
          focus_areas:
            - android/app/src/main/java/
          EOF
          fi
      
      - name: Generate Integration Status
        run: |
          echo "📋 Generating integration status..."
          cat > integration-status.md << 'EOF'
          # Qodo.ai Integration Status
          
          ## ✅ Completed
          - [x] GitHub Actions workflow created
          - [x] Configuration templates generated
          - [x] iOS and Android analysis setup
          - [x] Quality reporting pipeline
          
          ## 🔄 In Progress
          - [ ] Qodo CLI installation and authentication
          - [ ] Full code analysis integration
          - [ ] Test generation automation
          - [ ] Quality gates implementation
          
          ## 📋 Next Steps
          1. **Setup Qodo Account**: Sign up at qodo.ai
          2. **Generate API Token**: Create token in Qodo dashboard
          3. **Add Repository Secret**: Add QODO_TOKEN to GitHub secrets
          4. **Enable Full Analysis**: Uncomment analysis commands in workflow
          5. **Configure Quality Gates**: Set up PR blocking rules
          
          ## 🔗 Resources
          - [Qodo.ai Documentation](https://docs.qodo.ai)
          - [GitHub Secrets Setup](https://docs.github.com/en/actions/security-guides/encrypted-secrets)
          - [Integration Guide](.kiro/steering/qodo-integration.md)
          EOF
          
          echo "Integration status generated"
      
      - name: Upload Integration Status
        uses: actions/upload-artifact@v4
        with:
          name: integration-status
          path: |
            integration-status.md
            .qodo/
        if: always()